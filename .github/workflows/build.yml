name: Build YTLocalQueue

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl make perl unzip xz-utils libtinfo5

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download iOS SDK
        run: |
          curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS13.7.sdk.tar.xz -o sdk.tar.xz
          mkdir -p $THEOS/sdks
          tar -xf sdk.tar.xz -C $THEOS/sdks

      - name: Download iOS Toolchain
        run: |
          curl -L https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64e-clang-toolchain.tar.lzma -o toolchain.tar.lzma
          mkdir -p $THEOS/toolchain/linux/iphone
          tar -xf toolchain.tar.lzma --strip-components=1 -C $THEOS/toolchain/linux/iphone

      - name: Get YouTube Headers
        run: |
          git clone https://github.com/PoomSmart/YouTubeHeader.git ${{ github.workspace }}/Headers/YouTubeHeader

      - name: Build
        run: |
          make package THEOS_PACKAGE_SCHEME=rootless SYSROOT=$THEOS/sdks/iPhoneOS13.7.sdk TARGET=iphone:13.0:13.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTLocalQueue-dylib
          path: packages/*.deb
